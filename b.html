<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a time — WeCalendar</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='8' y='14' width='84' height='78' rx='14' fill='%237C6FF7'/%3E%3Crect x='8' y='34' width='84' height='58' rx='10' fill='%23fff'/%3E%3Crect x='22' y='46' width='18' height='14' rx='4' fill='%23e8e5ff'/%3E%3Crect x='46' y='46' width='18' height='14' rx='4' fill='%237C6FF7'/%3E%3Crect x='22' y='68' width='18' height='14' rx='4' fill='%23e8e5ff'/%3E%3Crect x='46' y='68' width='18' height='14' rx='4' fill='%23e8e5ff'/%3E%3Ccircle cx='30' cy='8' r='7' fill='%232C1C6C'/%3E%3Ccircle cx='70' cy='8' r='7' fill='%232C1C6C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="wecal-config.js"></script>
<style>
  :root{ --accent:#7C6FF7; --accent-d:#5E43C8; --ink:#2C1C6C; --muted:#6b7280; --line:#E2DBFF; --green:#00C875; --green-d:#00B268; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#FBF9FF; color:var(--ink); font-size:14px; min-height:100vh; display:flex; justify-content:center; padding:28px 16px; }
  .card{ width:100%; max-width:560px; background:#fff; border:1px solid var(--line); border-radius:20px; box-shadow:0 8px 40px rgba(44,28,108,.08); overflow:hidden; }
  .hd{ padding:24px 28px 18px; border-bottom:1px solid var(--line); }
  .wordmark{ font-size:14px; font-weight:600; letter-spacing:.01em; }
  .wordmark .a1{ color:var(--accent); } .wordmark .a2{ color:var(--ink); }
  h1{ font-size:21px; font-weight:600; margin:12px 0 4px; line-height:1.25; }
  .sub{ font-size:13px; color:var(--muted); }
  .tzrow{ display:flex; align-items:center; gap:8px; margin-top:14px; font-size:12.5px; color:var(--muted); }
  .tzrow select{ font-family:inherit; font-size:12.5px; border:1px solid var(--line); border-radius:8px; padding:5px 8px; color:var(--ink); background:#fff; }
  .body{ padding:18px 28px 26px; }
  .day{ font-size:13px; font-weight:700; color:var(--ink); margin:18px 0 8px; }
  .day:first-child{ margin-top:4px; }
  .slots{ display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
  .slot{ border:1.5px solid var(--green); color:var(--green-d); background:#fff; border-radius:10px; padding:10px 8px; font-size:13.5px; font-weight:600; cursor:pointer; text-align:center; transition:.12s; font-family:inherit; }
  .slot:hover{ background:var(--green); color:#fff; }
  .empty,.msg{ text-align:center; color:var(--muted); padding:36px 10px; font-size:14px; line-height:1.6; }
  .spin{ display:inline-block; width:16px; height:16px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp .8s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  .foot{ padding:0 28px 22px; font-size:11.5px; color:#a99fce; text-align:center; }
  /* modal */
  .ov{ position:fixed; inset:0; background:rgba(44,28,108,.45); display:none; align-items:center; justify-content:center; padding:18px; z-index:30; }
  .ov.on{ display:flex; }
  .modal{ width:100%; max-width:400px; background:#fff; border-radius:16px; padding:24px; }
  .modal h2{ font-size:17px; font-weight:600; margin-bottom:4px; }
  .modal .when{ font-size:13px; color:var(--accent-d); font-weight:600; margin-bottom:16px; }
  .modal label{ display:block; font-size:12px; color:var(--muted); margin:12px 0 4px; }
  .modal input{ width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; font-family:inherit; color:var(--ink); outline:none; }
  .modal input:focus{ border-color:var(--accent); }
  .btn{ width:100%; margin-top:18px; border:none; border-radius:999px; padding:12px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; background:var(--green); color:#fff; }
  .btn:hover{ background:var(--green-d); }
  .btn:disabled{ opacity:.6; cursor:default; }
  .btn.sec{ background:none; color:var(--muted); margin-top:8px; font-weight:500; }
  .err{ color:#b91c1c; font-size:12.5px; margin-top:10px; min-height:16px; }
  .ok-ico{ width:54px; height:54px; border-radius:50%; background:#E6FBF1; color:var(--green-d); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:26px; }
  .joinbtn{ display:inline-block; margin-top:14px; background:var(--accent); color:#fff; text-decoration:none; border-radius:999px; padding:10px 22px; font-weight:600; font-size:14px; }
</style>
</head>
<body>
  <div class="card">
    <div class="hd">
      <span class="wordmark"><span class="a1">we</span><span class="a2">calendar</span></span>
      <h1 id="title">Loading…</h1>
      <div class="sub" id="sub">Pick a time that works for you.</div>
      <div class="tzrow">🌐 Times shown in <select id="tzSel"></select></div>
    </div>
    <div class="body"><div id="list"><div class="msg"><span class="spin"></span></div></div></div>
    <div class="foot">Powered by WeCalendar · one-click booking, no account needed</div>
  </div>

  <div class="ov" id="ov">
    <div class="modal" id="modal"></div>
  </div>

<script>
const C = window.WECAL || {};
const FN = C.FN_BASE || (C.SUPABASE_URL ? C.SUPABASE_URL + "/functions/v1" : "");
const slug = new URLSearchParams(location.search).get("l");
const $ = (id) => document.getElementById(id);

let sb = null, LINK = null, SLOTS = [], TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

const TZS = [
  ["America/Los_Angeles","Los Angeles (PT)"],["America/Denver","Denver (MT)"],
  ["America/Chicago","Chicago (CT)"],["America/New_York","New York (ET)"],
  ["America/Sao_Paulo","São Paulo"],["Europe/London","London"],["Europe/Lisbon","Lisbon"],
  ["Europe/Amsterdam","Amsterdam (CET)"],["Europe/Athens","Athens (EET)"],["Asia/Dubai","Dubai"],
  ["Asia/Kolkata","India (IST)"],["Asia/Singapore","Singapore"],["Asia/Hong_Kong","Hong Kong"],
  ["Asia/Tokyo","Tokyo"],["Australia/Sydney","Sydney"],["Pacific/Auckland","Auckland"],["UTC","UTC"],
];

function fail(msg){ $("list").innerHTML = '<div class="msg">' + msg + '</div>'; }

function buildTzSel(){
  const sel = $("tzSel");
  if (!TZS.some(z => z[0] === TZ)) TZS.unshift([TZ, TZ.replace(/_/g," ")]);
  sel.innerHTML = TZS.map(z => '<option value="'+z[0]+'">'+z[1]+'</option>').join("");
  sel.value = TZ;
  sel.onchange = () => { TZ = sel.value; render(); };
}

function dayKey(d){ return new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"}).format(d); }
function dayLabel(d){ return new Intl.DateTimeFormat("en-US",{timeZone:TZ,weekday:"long",month:"long",day:"numeric"}).format(d); }
function timeLabel(d){ return new Intl.DateTimeFormat("en-US",{timeZone:TZ,hour:"numeric",minute:"2-digit"}).format(d); }

function render(){
  const open = SLOTS.filter(s => s.status === "open" && new Date(s.start_utc) > new Date())
                    .sort((a,b)=> new Date(a.start_utc) - new Date(b.start_utc));
  if (!open.length){ fail("🎉 All booked! Thank you."); return; }
  const byDay = {};
  open.forEach(s => { const k = dayKey(new Date(s.start_utc)); (byDay[k] = byDay[k] || []).push(s); });
  let html = "";
  Object.keys(byDay).sort().forEach(k => {
    html += '<div class="day">' + dayLabel(new Date(byDay[k][0].start_utc)) + '</div><div class="slots">';
    byDay[k].forEach(s => {
      html += '<button class="slot" data-id="'+s.id+'">'+timeLabel(new Date(s.start_utc))+'</button>';
    });
    html += '</div>';
  });
  $("list").innerHTML = html;
  document.querySelectorAll(".slot").forEach(b => b.onclick = () => openModal(b.dataset.id));
}

function openModal(id){
  const s = SLOTS.find(x => x.id === id);
  if (!s) return;
  booking = false;
  if (sb && LINK) sb.from("analytics_events").insert({ link_id: LINK.id, type: "slot_click", meta:{ slotId:id } });
  const when = dayLabel(new Date(s.start_utc)) + " · " + timeLabel(new Date(s.start_utc)) + "–" + timeLabel(new Date(s.end_utc));
  $("modal").innerHTML =
    '<h2>Confirm your booking</h2><div class="when">'+when+'</div>'+
    '<label>Your name</label><input id="gName" autocomplete="name">'+
    '<label>Your email</label><input id="gEmail" type="email" autocomplete="email">'+
    '<label style="margin-bottom:2px">Bring your team <span style="color:var(--muted);font-weight:400">(optional)</span></label>'+
    '<div id="guestWrap"></div>'+
    '<button type="button" id="addGuest" style="background:none;border:none;color:var(--accent);font:inherit;font-size:13px;cursor:pointer;padding:6px 0 0">+ Add a teammate</button>'+
    '<div class="err" id="mErr"></div>'+
    '<button class="btn" id="confirm">Book it</button>'+
    '<button class="btn sec" id="cancel">Cancel</button>';
  $("ov").classList.add("on");
  $("cancel").onclick = closeModal;
  $("confirm").onclick = () => doBook(id);
  $("addGuest").onclick = addGuestRow;
  $("gName").focus();
}
function addGuestRow(){
  const wrap = $("guestWrap");
  if (wrap.querySelectorAll(".gGuest").length >= 10) return;
  const row = document.createElement("div");
  row.style.cssText = "display:flex;gap:6px;align-items:center;margin-top:8px";
  row.innerHTML = '<input class="gGuest" type="email" placeholder="teammate@company.com" autocomplete="off" style="flex:1">'+
    '<button type="button" aria-label="Remove" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 4px">×</button>';
  row.querySelector("button").onclick = () => row.remove();
  wrap.appendChild(row);
  row.querySelector("input").focus();
}
function closeModal(){ $("ov").classList.remove("on"); }

let booking = false;
async function doBook(slotId){
  const name = $("gName").value.trim(), email = $("gEmail").value.trim();
  if (!name || !/.+@.+\..+/.test(email)){ $("mErr").textContent = "Please enter your name and a valid email."; return; }
  if (booking) return; booking = true;
  const guests = [...new Set([...document.querySelectorAll(".gGuest")].map(i => i.value.trim().toLowerCase()).filter(v => /.+@.+\..+/.test(v) && v !== email.toLowerCase()))];
  const btn = $("confirm"); btn.disabled = true; btn.textContent = "Booking…"; $("mErr").textContent = "";
  try {
    const r = await fetch(FN + "/book-slot", {
      method: "POST",
      headers: { "Content-Type":"application/json", "apikey": C.SUPABASE_ANON_KEY, "Authorization":"Bearer "+C.SUPABASE_ANON_KEY },
      body: JSON.stringify({ slug, slotId, name, email, guests }),
    });
    const j = await r.json().catch(()=>({}));
    if (r.status === 409 || j.reason === "taken"){
      $("mErr").textContent = "Sorry — someone just grabbed that one. Pick another.";
      const s = SLOTS.find(x=>x.id===slotId); if (s) s.status = "booked";
      setTimeout(() => { closeModal(); render(); }, 1400); return;
    }
    if (!r.ok || !j.ok){ $("mErr").textContent = "Something went wrong — please try again."; btn.disabled=false; btn.textContent="Book it"; booking=false; return; }
    const s = SLOTS.find(x=>x.id===slotId); if (s) s.status = "booked";
    const whenStr = s ? "See you " + new Intl.DateTimeFormat("en-US", { timeZone: TZ, weekday: "long" }).format(new Date(s.start_utc)) + " at " + timeLabel(new Date(s.start_utc)) : "";
    confirmView(j.joinUrl, name, whenStr, j.bookingId);
  } catch(e){ $("mErr").textContent = "Network error — please try again."; btn.disabled=false; btn.textContent="Book it"; booking=false; }
}

function confirmView(joinUrl, name, whenStr, bookingId){
  const safeJoin = (joinUrl && /^https?:\/\/[^\s"'<>]+$/i.test(joinUrl)) ? joinUrl : "";
  const first = ((name || "").trim().split(/\s+/)[0] || "").replace(/[<>&"]/g, "");
  $("modal").innerHTML =
    '<div class="ok-ico">✓</div>'+
    '<h2 style="text-align:center">You’re booked' + (first ? ", " + first : "") + '! 🎉</h2>'+
    '<p style="text-align:center;color:var(--muted);margin-top:6px;font-size:13.5px">' + (whenStr ? whenStr + ". " : "") + 'A calendar invite is on its way to your inbox.</p>'+
    (safeJoin ? '<div style="text-align:center"><a class="joinbtn" href="'+safeJoin+'" target="_blank" rel="noopener">Join link</a></div>' : '')+
    '<button class="btn sec" id="done" style="margin-top:18px">Done</button>'+
    (bookingId ? '<div style="text-align:center;margin-top:10px"><a href="?cancel='+encodeURIComponent(bookingId)+'" style="color:var(--muted);font-size:12.5px">Need to cancel?</a></div>' : '');
  $("done").onclick = () => { closeModal(); render(); };
  if (window.confetti) { try { window.confetti({ particleCount: 130, spread: 78, origin: { y: 0.6 }, colors: ['#7C6FF7','#00C875','#C9BCFF','#FFC400'] }); } catch(e){} }
}

function greeting(){ const h = new Date().getHours(); return h < 12 ? "Good morning! ☀️" : h < 18 ? "Good afternoon! 👋" : "Good evening! 🌙"; }

function renderCancel(id){
  $("title").textContent = "Cancel booking";
  $("sub").textContent = "";
  const tz = document.querySelector(".tzrow"); if (tz) tz.style.display = "none";
  if (!FN || !C.SUPABASE_ANON_KEY){ fail("Booking isn’t configured."); return; }
  $("list").innerHTML = '<div class="msg" style="text-align:center">'
    + '<p style="font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px">Cancel this meeting?</p>'
    + '<p style="font-size:13px;color:var(--muted);margin-bottom:18px">This frees the time slot and notifies everyone on the invite.</p>'
    + '<button class="btn" id="cxConfirm" style="background:#E5484D;max-width:260px;margin:0 auto">Yes, cancel it</button>'
    + '<div class="err" id="cxErr" style="margin-top:10px"></div></div>';
  $("cxConfirm").onclick = async () => {
    const btn = $("cxConfirm"); btn.disabled = true; btn.textContent = "Cancelling…"; $("cxErr").textContent = "";
    try {
      const r = await fetch(FN + "/cancel-booking", { method: "POST", headers: { "Content-Type": "application/json", apikey: C.SUPABASE_ANON_KEY, Authorization: "Bearer " + C.SUPABASE_ANON_KEY }, body: JSON.stringify({ bookingId: id }) });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.ok){
        $("list").innerHTML = '<div class="msg" style="text-align:center"><div class="ok-ico">✓</div><p style="font-size:16px;color:var(--ink);font-weight:600;margin-top:8px">Your meeting is cancelled.</p><p style="font-size:13px;color:var(--muted);margin-top:4px">The time has been freed up — you can close this page.</p></div>';
      } else if (j.reason === "not_found"){
        $("cxErr").textContent = "Couldn’t find that booking — it may already be cancelled."; btn.disabled = false; btn.textContent = "Yes, cancel it";
      } else {
        $("cxErr").textContent = "Something went wrong — please try again."; btn.disabled = false; btn.textContent = "Yes, cancel it";
      }
    } catch(e){ $("cxErr").textContent = "Network error — please try again."; btn.disabled = false; btn.textContent = "Yes, cancel it"; }
  };
}

async function init(){
  const cancelId = new URLSearchParams(location.search).get("cancel");
  if (cancelId){ renderCancel(cancelId); return; }
  buildTzSel();
  if (!slug){ fail("This booking link is missing its code."); return; }
  if (!C.SUPABASE_URL || !C.SUPABASE_ANON_KEY){
    fail("Booking isn’t configured yet.<br><span style='font-size:12px'>The host needs to finish backend setup (wecalendar-backend/README.md).</span>"); return;
  }
  sb = window.supabase.createClient(C.SUPABASE_URL, C.SUPABASE_ANON_KEY);

  const { data: link } = await sb.from("links").select("id,title,tz,status").eq("slug", slug).maybeSingle();
  if (!link || link.status !== "active"){ fail("This booking link has expired or doesn’t exist."); return; }
  LINK = link;
  $("title").textContent = link.title || "Book a time";
  $("sub").textContent = greeting() + " Pick a time that works for you — it books instantly.";
  if (link.tz && TZS.some(z=>z[0]===link.tz)) { /* keep visitor's tz as default */ }

  const { data: slots } = await sb.from("slots").select("id,start_utc,end_utc,status").eq("link_id", link.id);
  SLOTS = slots || [];
  sb.from("analytics_events").insert({ link_id: link.id, type: "view" });
  render();

  // live slot-locking: when any slot flips status, reflect it immediately
  sb.channel("slots-" + link.id)
    .on("postgres_changes",
      { event: "UPDATE", schema: "public", table: "slots", filter: "link_id=eq." + link.id },
      (payload) => {
        const i = SLOTS.findIndex(x => x.id === payload.new.id);
        if (i >= 0) SLOTS[i] = payload.new; else SLOTS.push(payload.new);
        if (!$("ov").classList.contains("on")) render();
      })
    .subscribe();
}
$("ov").addEventListener("click", (e)=>{ if (e.target.id === "ov") closeModal(); });
init();
</script>
</body>
</html>
