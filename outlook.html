<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeCalendar</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="wecal-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#7C6FF7; --accent-d:#6B5FE0; --ink:#2C1C6C; --muted:#6b7280; --line:#E2DBFF; --green:#00C875; --green-d:#00b368; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--ink); padding:16px; background:#fff; }
  .brand{ font-size:15px; font-weight:700; margin-bottom:2px; } .brand .a1{color:var(--accent)} .brand .a2{color:var(--ink)}
  .sub{ font-size:12px; color:var(--muted); margin-bottom:16px; line-height:1.45; }
  .btn{ width:100%; margin-top:10px; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; background:var(--accent); color:#fff; }
  .btn:hover{ background:var(--accent-d); } .btn:disabled{ opacity:.5; cursor:default; }
  .btn.green{ background:var(--green); } .btn.green:hover{ background:var(--green-d); }
  .btn.sec{ background:#fff; color:var(--accent); border:1px solid var(--line); }
  .row{ display:flex; gap:8px; }
  .seg{ display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:6px 0 2px; }
  .seg button{ flex:1; border:none; background:#fff; padding:8px; font-family:inherit; font-size:13px; color:var(--ink); cursor:pointer; }
  .seg button.on{ background:var(--accent); color:#fff; font-weight:600; }
  label{ display:block; font-size:12px; color:var(--muted); margin:12px 0 5px; font-weight:500; }
  textarea,input{ width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:13px; font-family:inherit; color:var(--ink); outline:none; resize:vertical; }
  textarea:focus,input:focus{ border-color:var(--accent); }
  .slots{ margin-top:12px; font-size:12.5px; color:var(--ink); max-height:200px; overflow:auto; }
  .slots .day{ font-weight:600; margin:8px 0 3px; font-size:12px; }
  .slots .t{ color:var(--muted); padding:1px 0; }
  .or{ text-align:center; font-size:11px; color:var(--muted); margin:18px 0 4px; position:relative; }
  .or:before,.or:after{ content:""; position:absolute; top:50%; width:36%; height:1px; background:var(--line); } .or:before{ left:0; } .or:after{ right:0; }
  .msg{ font-size:12px; margin-top:10px; min-height:16px; }
  .ok{ color:var(--green-d); font-weight:600; } .err{ color:#b91c1c; }
  .hide{ display:none; }
</style>
</head>
<body>
  <div class="brand"><span class="a1">we</span><span class="a2">calendar</span></div>
  <div class="sub">Pick your free times here — it drops a booking link into your email and your recipient books instantly.</div>

  <div id="signedout">
    <button class="btn" id="signin">Sign in to WeCalendar</button>
    <div class="msg" id="soMsg"></div>
  </div>

  <div id="picker" class="hide">
    <label>Slot length</label>
    <div class="seg" id="seg">
      <button data-l="15">15m</button><button data-l="30" class="on">30m</button><button data-l="60">60m</button>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="btn sec" id="pickDay" style="margin-top:0">Select slots for day</button>
      <button class="btn sec" id="pickWeek" style="margin-top:0">Select slots for week</button>
    </div>
    <div class="slots" id="slots"></div>
    <button class="btn green hide" id="insertLink">Insert booking link</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="or">or paste a link</div>
  <textarea id="lnk" rows="2" placeholder="https://wecalendar.github.io/b.html?l=..."></textarea>
  <button class="btn sec" id="insertPaste">Insert pasted link</button>
  <div class="msg" id="pMsg"></div>

<script>
  var $ = function(id){ return document.getElementById(id); };
  var WC = window.WECAL || {};
  var ready = false, TOKEN = null, EMAIL = "", SLOTS = [], SLOTLEN = 30, WORK_START = 9, WORK_END = 18;

  Office.onReady(function(info){ ready = !!(info && info.host === Office.HostType.Outlook); });

  // ---- segmented slot length ----
  $("seg").addEventListener("click", function(e){
    var b = e.target.closest("button"); if (!b) return;
    SLOTLEN = +b.dataset.l;
    [].forEach.call($("seg").querySelectorAll("button"), function(x){ x.classList.toggle("on", x === b); });
  });

  // ---- sign in (one-time popup that returns a token) ----
  $("signin").onclick = function(){
    var m = $("soMsg"); m.className = "msg"; m.textContent = "Opening sign in…";
    Office.context.ui.displayDialogAsync("https://wecalendar.github.io/?dlg=auth", { height: 60, width: 40, promptBeforeOpen: false }, function(res){
      if (res.status !== Office.AsyncResultStatus.Succeeded){ m.className = "msg err"; m.textContent = "Couldn't open sign in: " + ((res.error && res.error.message) || ""); return; }
      var dlg = res.value;
      dlg.addEventHandler(Office.EventType.DialogMessageReceived, function(arg){
        var d; try { d = JSON.parse(arg.message); } catch(e){ d = {}; }
        try { dlg.close(); } catch(e){}
        if (d.token){ TOKEN = d.token; EMAIL = d.email || ""; $("signedout").classList.add("hide"); $("picker").classList.remove("hide"); }
        else { m.className = "msg err"; m.textContent = "Sign in didn't complete" + (d.error ? (": " + d.error) : "") + ". Try again."; }
      });
      dlg.addEventHandler(Office.EventType.DialogEventReceived, function(){});
    });
  };

  // ---- date helpers ----
  function daysFor(scope){
    var now = new Date();
    if (scope === "day") return [new Date(now.getFullYear(), now.getMonth(), now.getDate())];
    var mon = new Date(now.getFullYear(), now.getMonth(), now.getDate() - ((now.getDay() + 6) % 7));
    var out = []; for (var i = 0; i < 5; i++){ var d = new Date(mon); d.setDate(mon.getDate() + i); out.push(d); } return out;
  }
  function fmtTime(d){ return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }); }
  function fmtDay(d){ return d.toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" }); }

  // ---- pick free slots ----
  function pick(scope){
    var msg = $("msg"); msg.className = "msg"; msg.textContent = "Reading your calendar…"; $("insertLink").classList.add("hide"); SLOTS = [];
    var days = daysFor(scope);
    var ws = new Date(days[0].getFullYear(), days[0].getMonth(), days[0].getDate(), 0, 0, 0);
    var last = days[days.length - 1];
    var we = new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1, 0, 0, 0);
    var url = "https://graph.microsoft.com/v1.0/me/calendarView?" + new URLSearchParams({ startDateTime: ws.toISOString(), endDateTime: we.toISOString(), "$select": "start,end,showAs,isAllDay", "$top": "200" });
    fetch(url, { headers: { Authorization: "Bearer " + TOKEN, Prefer: 'outlook.timezone="UTC"' } })
      .then(function(r){ if (r.status === 401){ throw { expired: true }; } return r.json(); })
      .then(function(j){
        var busy = (j.value || []).filter(function(ev){ return !ev.isAllDay && ev.showAs !== "free"; })
          .map(function(ev){ return { start: new Date(ev.start.dateTime + "Z"), end: new Date(ev.end.dateTime + "Z") }; });
        var now = new Date();
        days.forEach(function(d){
          for (var mm = WORK_START * 60; mm + SLOTLEN <= WORK_END * 60; mm += SLOTLEN){
            var s = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, mm);
            var e = new Date(s.getTime() + SLOTLEN * 60000);
            if (s < now) continue;
            if (busy.some(function(b){ return b.start < e && s < b.end; })) continue;
            SLOTS.push({ start: s, end: e });
          }
        });
        renderSlots();
        if (SLOTS.length){ $("insertLink").classList.remove("hide"); msg.textContent = ""; }
        else { msg.className = "msg err"; msg.textContent = "No open slots in 9am–6pm this " + scope + "."; }
      })
      .catch(function(err){
        if (err && err.expired){ msg.className = "msg err"; msg.textContent = "Session expired — sign in again."; TOKEN = null; $("picker").classList.add("hide"); $("signedout").classList.remove("hide"); }
        else { msg.className = "msg err"; msg.textContent = "Couldn't read calendar: " + ((err && err.message) || "try again"); }
      });
  }
  function renderSlots(){
    var byDay = {}, order = [];
    SLOTS.forEach(function(x){ var k = x.start.toDateString(); if (!byDay[k]){ byDay[k] = []; order.push(k); } byDay[k].push(x); });
    var h = "";
    order.forEach(function(k){ h += '<div class="day">' + fmtDay(byDay[k][0].start) + '</div>'; byDay[k].forEach(function(x){ h += '<div class="t">• ' + fmtTime(x.start) + ' – ' + fmtTime(x.end) + '</div>'; }); });
    $("slots").innerHTML = h;
  }
  $("pickDay").onclick = function(){ pick("day"); };
  $("pickWeek").onclick = function(){ pick("week"); };

  // ---- create link + insert ----
  $("insertLink").onclick = function(){
    if (!SLOTS.length) return;
    var msg = $("msg"); msg.className = "msg"; msg.textContent = "Creating your booking link…";
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    fetch(WC.FN_BASE + "/publish-link", {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: WC.SUPABASE_ANON_KEY, Authorization: "Bearer " + TOKEN },
      body: JSON.stringify({ title: "Meeting with " + (EMAIL || "me"), tz: tz, slots: SLOTS.map(function(x){ return { start: x.start.toISOString(), end: x.end.toISOString() }; }), attendees: [], videoLink: "", settings: { workStart: WORK_START, workEnd: WORK_END, buffer: 0, minNotice: 0, dayCap: 0 } })
    })
    .then(function(r){ return r.json().then(function(j){ return { status: r.status, j: j }; }); })
    .then(function(o){
      if (o.status === 412 || (o.j && o.j.error === "not_connected")){ msg.className = "msg err"; msg.textContent = "Open WeCalendar in your browser and sign in once to connect your calendar for booking, then come back."; return; }
      if (!o.j || !o.j.url){ msg.className = "msg err"; msg.textContent = "Couldn't create link" + (o.j && o.j.detail ? (": " + o.j.detail) : ""); return; }
      insertHtml('<a href="' + o.j.url + '">Book a time with me</a>', msg, "✓ Booking link added to your email.");
    })
    .catch(function(e){ msg.className = "msg err"; msg.textContent = "Error: " + ((e && e.message) || "try again"); });
  };

  // ---- paste fallback ----
  $("insertPaste").onclick = function(){
    var url = $("lnk").value.trim(), msg = $("pMsg");
    if (!/^https?:\/\/.+/.test(url)){ msg.className = "msg err"; msg.textContent = "Paste a valid link first."; return; }
    insertHtml('<a href="' + url + '">Book a time with me</a>', msg, "✓ Link added to your email.");
  };

  function insertHtml(html, msg, okText){
    if (!ready || !Office.context.mailbox || !Office.context.mailbox.item || !Office.context.mailbox.item.body){
      msg.className = "msg err"; msg.textContent = "Open this while composing an email."; return;
    }
    Office.context.mailbox.item.body.setSelectedDataAsync(html, { coercionType: Office.CoercionType.Html }, function(r){
      if (r.status === Office.AsyncResultStatus.Succeeded){ msg.className = "msg ok"; msg.textContent = okText; }
      else { msg.className = "msg err"; msg.textContent = "Couldn't insert: " + ((r.error && r.error.message) || "try again"); }
    });
  }
</script>
</body>
</html>
